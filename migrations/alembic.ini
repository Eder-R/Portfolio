# A generic, single database configuration.

[alembic]
# O caminho para o diretório onde as migrações serão armazenadas
script_location = %(here)s/alembic

# A URL do banco de dados
sqlalchemy.url = sqlite:///../database/LibManager.db

# [Outras configurações...]

[alembic:context]
# O caminho para o diretório onde as migrações serão armazenadas
script_location = %(here)s/alembic

# A URL do banco de dados
sqlalchemy.url = sqlite:///../database/LibManager.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
